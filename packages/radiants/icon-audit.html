<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RDNA Icon Mapper</title>
<style>
  @font-face { font-family: 'PixelCode'; src: url('fonts/PixelCode.woff2') format('woff2'); font-weight: 400; }
  @font-face { font-family: 'PixelCode'; src: url('fonts/PixelCode-Bold.woff2') format('woff2'); font-weight: 700; }
  @font-face { font-family: 'Joystix Monospace'; src: url('fonts/Joystix.woff2') format('woff2'); font-weight: 400; }

  :root {
    --page: oklch(0.1641 0.0044 84.59);
    --page-up: oklch(0.22 0.005 84.59);
    --page-up2: oklch(0.28 0.006 84.59);
    --page-up3: oklch(0.34 0.007 84.59);
    --main: oklch(0.9780 0.0295 94.34);
    --dim: oklch(0.65 0.015 84.59);
    --muted: oklch(0.45 0.010 84.59);
    --accent: oklch(0.9126 0.1170 93.68);
    --accent-15: oklch(0.9126 0.1170 93.68 / 0.15);
    --accent-25: oklch(0.9126 0.1170 93.68 / 0.25);
    --line: oklch(0.9780 0.0295 94.34 / 0.12);
    --line-bold: oklch(0.9780 0.0295 94.34 / 0.2);
    --green: oklch(0.72 0.17 152);
    --green-15: oklch(0.72 0.17 152 / 0.15);
    --red: oklch(0.65 0.20 25);
    --red-15: oklch(0.65 0.20 25 / 0.15);
    --orange: oklch(0.75 0.15 55);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'PixelCode', monospace;
    background: var(--page);
    color: var(--main);
    font-size: 12px;
    line-height: 1.5;
    overflow: hidden;
    height: 100vh;
    image-rendering: pixelated;
  }

  /* ── Header ── */
  .hdr {
    height: 44px; border-bottom: 1px solid var(--line-bold);
    padding: 0 12px; display: flex; align-items: center; gap: 10px;
  }
  .hdr h1 {
    font-family: 'Joystix Monospace', monospace;
    font-size: 11px; color: var(--accent); letter-spacing: 1px;
  }
  .hdr-stats { display: flex; gap: 14px; font-size: 10px; color: var(--dim); }
  .hdr-stats b { font-weight: 700; }
  .hdr-stats .g { color: var(--green); }
  .hdr-stats .r { color: var(--red); }
  .hdr-stats .o { color: var(--orange); }
  .hdr-right { margin-left: auto; display: flex; gap: 5px; }
  .btn {
    font-family: 'PixelCode', monospace; font-size: 10px;
    background: var(--page-up); border: 1px solid var(--line-bold); color: var(--main);
    padding: 4px 10px; cursor: pointer;
  }
  .btn:hover { background: var(--page-up2); }
  .btn-accent { background: var(--accent); color: var(--page); border-color: var(--accent); font-weight: 700; }
  .btn-accent:hover { opacity: 0.9; }

  /* ── Layout ── */
  .shell { display: flex; height: calc(100vh - 44px); }

  /* ── Sidebar ── */
  .nav {
    width: 160px; min-width: 160px; border-right: 1px solid var(--line-bold);
    overflow-y: auto; padding: 4px 0;
  }
  .nav-label {
    padding: 6px 8px 2px; font-size: 8px; text-transform: uppercase;
    letter-spacing: 1px; color: var(--muted);
  }
  .nav-item {
    padding: 4px 8px; cursor: pointer; display: flex; justify-content: space-between;
    align-items: center; font-size: 10px; border-left: 2px solid transparent;
  }
  .nav-item:hover { background: var(--page-up); }
  .nav-item.on { background: var(--page-up); border-left-color: var(--accent); color: var(--accent); }
  .nav-item .n { color: var(--muted); font-size: 9px; }
  .nav-item.on .n { color: var(--accent); opacity: 0.6; }
  .nav-item .pbar {
    height: 2px; background: var(--page-up2); flex: 1; margin: 0 5px;
    min-width: 12px; position: relative; border-radius: 1px;
  }
  .nav-item .pfill {
    position: absolute; left: 0; top: 0; height: 100%;
    background: var(--green); border-radius: 1px;
  }

  /* ── Main ── */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .cat-bar {
    padding: 6px 12px; border-bottom: 1px solid var(--line);
    display: flex; align-items: center; gap: 10px; background: var(--page-up);
  }
  .cat-bar h2 { font-family: 'Joystix Monospace', monospace; font-size: 10px; }
  .cat-bar .inf { font-size: 10px; color: var(--dim); }
  .cat-bar .inf b { color: var(--main); }

  .cols { flex: 1; display: flex; overflow: hidden; }

  /* ── Column (shared) ── */
  .col {
    flex: 1; display: flex; flex-direction: column; overflow: hidden;
  }
  .col + .col { border-left: 1px solid var(--line-bold); }
  .col-head {
    padding: 6px 10px; border-bottom: 1px solid var(--line);
    display: flex; align-items: center; gap: 8px; background: var(--page-up);
    flex-shrink: 0;
  }
  .col-head .label {
    font-family: 'Joystix Monospace', monospace; font-size: 9px;
    color: var(--accent); letter-spacing: 0.5px;
  }
  .col-head .ct { font-size: 9px; color: var(--muted); margin-left: auto; }
  .col-search {
    font-family: 'PixelCode', monospace; font-size: 11px;
    background: var(--page); border: 1px solid var(--line-bold); color: var(--main);
    padding: 4px 8px; width: 100%; margin: 6px 10px; width: calc(100% - 20px);
    flex-shrink: 0;
  }
  .col-search::placeholder { color: var(--muted); }
  .col-list { flex: 1; overflow-y: auto; padding: 2px 6px 12px; }

  .section-label {
    font-size: 8px; text-transform: uppercase; letter-spacing: 1px;
    color: var(--muted); padding: 6px 4px 2px;
  }

  /* ── Icon row ── */
  .row {
    display: flex; align-items: center; gap: 6px; padding: 3px 5px;
    cursor: pointer; border: 1px solid transparent; margin-bottom: 1px;
  }
  .row:hover { background: var(--page-up); }
  .row.sel { border-color: var(--accent); background: var(--accent-25); }
  .row.paired { border-left: 2px solid var(--green); }
  .row.del { opacity: 0.3; }
  .row.del .rname { text-decoration: line-through; }
  .row.dim { opacity: 0.2; pointer-events: none; }

  .rthumb {
    width: 26px; height: 26px; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; background: var(--page-up2); border-radius: 2px;
  }
  .rthumb img {
    filter: invert(1) brightness(0.95) sepia(0.12) saturate(0.25) hue-rotate(10deg);
    image-rendering: pixelated;
  }
  .rthumb.s16 img { width: 16px; height: 16px; }
  .rthumb.s24 img { width: 24px; height: 24px; }
  .rthumb.empty { opacity: 0.3; }
  .rthumb.empty::after { content: '?'; color: var(--red); font-size: 12px; font-weight: 700; }

  .rname {
    flex: 1; min-width: 0; font-size: 10px; overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap;
  }

  .rpair {
    display: flex; align-items: center; gap: 3px; flex-shrink: 0;
  }
  .rpair-thumb {
    width: 18px; height: 18px; display: flex; align-items: center; justify-content: center;
    background: var(--page-up2); border-radius: 2px;
  }
  .rpair-thumb img {
    width: 16px; height: 16px;
    filter: invert(1) brightness(0.95) sepia(0.12) saturate(0.25) hue-rotate(10deg);
    image-rendering: pixelated;
  }
  .rpair-name {
    font-size: 9px; color: var(--green); max-width: 90px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  .badge {
    font-size: 8px; padding: 1px 4px; flex-shrink: 0; letter-spacing: 0.3px;
  }
  .badge-map { background: var(--green-15); color: var(--green); }
  .badge-sel { background: var(--accent-15); color: var(--accent); }

  .xbtn {
    font-family: 'PixelCode', monospace; font-size: 8px;
    background: none; border: 1px solid var(--line); color: var(--dim);
    padding: 1px 4px; cursor: pointer; flex-shrink: 0;
  }
  .xbtn:hover { color: var(--red); border-color: var(--red); }

  .del-cb {
    appearance: none; width: 12px; height: 12px; border: 1px solid var(--line-bold);
    background: var(--page); cursor: pointer; flex-shrink: 0; position: relative;
  }
  .del-cb:checked { background: var(--red); border-color: var(--red); }
  .del-cb:checked::after {
    content: '\u00d7'; color: var(--page); font-size: 10px; font-weight: 700;
    position: absolute; top: -2px; left: 1px;
  }

  /* ── Grid view ── */
  .col-list.grid-mode {
    display: flex; flex-wrap: wrap; gap: 3px; align-content: flex-start;
    padding: 6px;
  }
  .col-list.grid-mode .section-label {
    width: 100%; flex-shrink: 0;
  }
  .col-list.grid-mode .row {
    width: 42px; height: 42px; padding: 0; margin: 0;
    display: flex; align-items: center; justify-content: center;
    position: relative; flex-direction: column; gap: 0;
  }
  .col-list.grid-mode .row .del-cb {
    position: absolute; top: 1px; right: 1px; width: 10px; height: 10px;
    opacity: 0; z-index: 2;
  }
  .col-list.grid-mode .row:hover .del-cb { opacity: 1; }
  .col-list.grid-mode .row .del-cb:checked { opacity: 1; }
  .col-list.grid-mode .row .rthumb { width: 28px; height: 28px; background: none; }
  .col-list.grid-mode .row .rname { display: none; }
  .col-list.grid-mode .row .rpair { display: none; }
  .col-list.grid-mode .row .xbtn { display: none; }
  .col-list.grid-mode .row .badge { display: none; }
  .col-list.grid-mode .row.paired { border-left: none; border-bottom: 2px solid var(--green); }
  .col-list.grid-mode .row.sel { border-color: var(--accent); }
  /* Tooltip on hover in grid mode */
  .col-list.grid-mode .row::after {
    content: attr(title); display: none; position: absolute;
    bottom: 100%; left: 50%; transform: translateX(-50%);
    background: var(--page-up3); border: 1px solid var(--line-bold); color: var(--main);
    padding: 2px 6px; font-size: 9px; white-space: nowrap; z-index: 50;
    pointer-events: none; margin-bottom: 3px; max-width: 200px;
    overflow: hidden; text-overflow: ellipsis;
  }
  .col-list.grid-mode .row:hover::after { display: block; }
  /* Grid badge for count */
  .col-list.grid-mode .row .gbadge {
    position: absolute; bottom: 1px; right: 1px;
    font-size: 7px; padding: 0 2px; background: var(--green-15); color: var(--green);
    line-height: 1.3;
  }
  /* Pair indicator dot in grid */
  .col-list.grid-mode .row .gpair {
    position: absolute; bottom: 2px; left: 2px;
    width: 8px; height: 8px; border-radius: 1px; overflow: hidden;
  }
  .col-list.grid-mode .row .gpair img {
    width: 8px; height: 8px;
    filter: invert(1) brightness(0.95) sepia(0.12) saturate(0.25) hue-rotate(10deg);
    image-rendering: pixelated;
  }

  .view-toggle {
    font-family: 'PixelCode', monospace; font-size: 9px;
    background: none; border: 1px solid var(--line); color: var(--muted);
    padding: 1px 5px; cursor: pointer; margin-left: 4px;
  }
  .view-toggle:hover { color: var(--main); border-color: var(--line-bold); }
  .view-toggle.on { color: var(--accent); border-color: var(--accent); }

  .hint {
    padding: 6px 10px; background: var(--accent-15); border: 1px solid var(--accent-25);
    font-size: 10px; color: var(--accent); text-align: center;
    margin: 6px 10px; display: none;
  }
  .hint.on { display: block; }

  /* ── Modal ── */
  .modal-bg {
    position: fixed; inset: 0; background: oklch(0.1 0.004 85 / 0.85); z-index: 200;
    display: none; align-items: center; justify-content: center;
  }
  .modal-bg.on { display: flex; }
  .modal {
    background: var(--page-up); border: 1px solid var(--line-bold);
    width: 640px; max-height: 80vh; display: flex; flex-direction: column;
  }
  .modal-top {
    padding: 8px 12px; border-bottom: 1px solid var(--line);
    display: flex; justify-content: space-between; align-items: center;
  }
  .modal-top h2 { font-family: 'Joystix Monospace', monospace; font-size: 10px; }
  .modal-body { padding: 12px; overflow-y: auto; flex: 1; }
  .modal-body pre {
    background: var(--page); padding: 10px; font-family: 'PixelCode', monospace;
    font-size: 10px; overflow-x: auto; white-space: pre; line-height: 1.6;
    max-height: 60vh; color: var(--main);
  }
  .modal-foot { padding: 8px 12px; border-top: 1px solid var(--line); display: flex; gap: 6px; justify-content: flex-end; }
</style>
</head>

    <button class="btn btn-accent" id="btn-export">EXPORT</button>
  </div>
</div>

<div class="shell">

      <div class="col" id="col-r">

          <span class="ct" id="ct-16"></span>

        <input class="col-search" id="q16" placeholder="Search 16px...">
        <div class="hint" id="hint16"></div>
        <div class="col-list" id="list16"></div>
      </div>
    </div>
  </div>
</div>

<div class="modal-bg" id="modal">
  <div class="modal">
    <div class="modal-top">
      <h2>EXPORT</h2>
      <button class="btn" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body"><pre id="modal-out"></pre></div>
    <div class="modal-foot">
      <button class="btn" onclick="copyExport()">COPY</button>
      <button class="btn" onclick="closeModal()">CLOSE</button>
    </div>
  </div>
</div>

function getCat(name) {
  const lc = name.toLowerCase();
  for (const [cat, prefixes] of Object.entries(CAT_MAP)) {
    for (const p of prefixes) {
      if (lc.startsWith(p.toLowerCase() + '-') || lc === p.toLowerCase()) return cat;
    }
  }
  return 'other';
}

  const c = getCat(n);

}

  if (a === 'interface') return -1;
  if (b === 'interface') return 1;

});

let sel24 = null, sel16 = null;
let curCat = null;
let q24 = '', q16 = '';
let view24 = 'list', view16 = 'list';
let undo = [];

function setView24(v) { view24 = v; renderCol24(); updateViewToggles(); }
function setView16(v) { view16 = v; renderCol16(); updateViewToggles(); }
function updateViewToggles() {
  document.getElementById('vt24-list').classList.toggle('on', view24 === 'list');
  document.getElementById('vt24-grid').classList.toggle('on', view24 === 'grid');
  document.getElementById('vt16-list').classList.toggle('on', view16 === 'list');
  document.getElementById('vt16-grid').classList.toggle('on', view16 === 'grid');
}

// Helper: get all 24px icons mapped to a given 16px icon
function get24sFor16(n16) {
  const out = [];
  for (const [k24, v16] of Object.entries(m24to16)) {
    if (v16 === n16) out.push(k24);
  }
  return out;
}
// Helper: how many 24px icons map to this 16px
function countFor16(n16) {
  let c = 0;
  for (const v of Object.values(m24to16)) { if (v === n16) c++; }
  return c;
}
// Helper: is this 16px used at all
function is16Used(n16) {
  for (const v of Object.values(m24to16)) { if (v === n16) return true; }
  return false;
}

function snap() {
  undo.push({ m: {...m24to16}, d: new Set(dels) });
  if (undo.length > 60) undo.shift();
}
function doUndo() {
  if (!undo.length) return;
  const s = undo.pop();
  m24to16 = s.m; dels = s.d;
  persist(); render();
}
function persist() { localStorage.setItem(SK, JSON.stringify({ map24to16: m24to16, deletions: [...dels] })); }
function load() {
  const s = localStorage.getItem(SK);
  if (s) {
    try {
      const d = JSON.parse(s);
      // New format: map24to16 is primary
      if (d.map24to16) {
        m24to16 = d.map24to16;
      } else if (d.map16to24) {
        // Migrate old 1:1 format: invert {n16:n24} → {n24:n16}
        m24to16 = {};
        for (const [n16, n24] of Object.entries(d.map16to24)) {
          m24to16[n24] = n16;
        }
      }
      dels = new Set(d.deletions || []);
      return;
    } catch(e) {}
  }
  // Load from initial map (invert INIT_MAP)
  m24to16 = {};
  for (const [n16, n24] of Object.entries(INIT_MAP)) {
    m24to16[n24] = n16;
  }
}
function reset() {
  if (!confirm('Reset all mappings to original state?')) return;
  localStorage.removeItem(SK); undo = []; load(); render();
}

// ══════════════════════════════════════════
// ACTIONS
// ══════════════════════════════════════════

function mapPair(n16, n24) {
  snap();
  m24to16[n24] = n16;
  // Keep sel16 active so user can keep clicking 24px icons
  sel24 = null;
  persist(); render();
}
function unmap24(n24) {
  snap(); delete m24to16[n24];
  persist(); render();
}
function toggleDel(n) { snap(); dels.has(n) ? dels.delete(n) : dels.add(n); persist(); render(); }

function click24(n24) {
  if (sel16) { mapPair(sel16, n24); return; }
  sel24 = sel24 === n24 ? null : n24;
  sel16 = null;
  render();
}
function click16(n16) {
  if (sel24) { mapPair(n16, sel24); sel24 = null; render(); return; }
  sel16 = sel16 === n16 ? null : n16;
  sel24 = null;
  render();
}

// ══════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════

function render() {
  renderNav(); renderCatBar(); renderCol24(); renderCol16(); renderStats(); updateViewToggles();
  const h24 = document.getElementById('hint24');
  const h16 = document.getElementById('hint16');
  if (sel24) {
    h24.textContent = `Selected: ${shortN(sel24)} — click a 16px icon to map`;
    h24.classList.add('on'); h16.textContent = 'Click any 16px icon to pair'; h16.classList.add('on');
  } else if (sel16) {
    h16.textContent = `Selected: ${sel16} — click a 24px icon to map`;
    h16.classList.add('on'); h24.textContent = 'Click any 24px icon to pair'; h24.classList.add('on');
  } else {
    h24.classList.remove('on'); h16.classList.remove('on');
  }
}

function renderStats() {
  const mapped24 = Object.keys(m24to16).length;
  const used16 = new Set(Object.values(m24to16)).size;
  const um24 = I24.filter(n => !m24to16[n] && !dels.has(n)).length;
  const um16 = I16.filter(n => !is16Used(n) && !dels.has(n)).length;
  const dc = dels.size;
  document.getElementById('stats').innerHTML =
    `<span><b class="g">${mapped24}</b> pairs (<b class="g">${used16}</b> unique 16px)</span>` +
    `<span><b class="r">${um24}</b> 24px free</span>` +
    `<span><b class="o">${um16}</b> 16px unused</span>` +
    (dc ? `<span><b class="r">${dc}</b> delete</span>` : '');
}

function renderNav() {
  const allMc = I24.filter(n => n in m24to16).length;
  const allPct = Math.round((allMc / I24.length) * 100);
  let h = '<div class="nav-label">Categories</div>';
  h += `<div class="nav-item ${curCat === 'all' ? 'on' : ''}" onclick="setCat('all')" style="font-weight:700">
    <span>all</span>
    <div class="pbar"><div class="pfill" style="width:${allPct}%"></div></div>
    <span class="n">${allMc}/${I24.length}</span>
  </div>`;
  for (const c of catList) {
    const icons = cats[c];
    const mc = icons.filter(n => n in m24to16).length;
    const pct = Math.round((mc / icons.length) * 100);
    h += `<div class="nav-item ${curCat === c ? 'on' : ''}" onclick="setCat('${c}')">
      <span>${c}</span>
      <div class="pbar"><div class="pfill" style="width:${pct}%"></div></div>
      <span class="n">${mc}/${icons.length}</span>
    </div>`;
  }
  document.getElementById('nav').innerHTML = h;
}

function setCat(c) { curCat = c; sel24 = null; sel16 = null; render(); }

function getIconsForCat() {
  if (curCat === 'all') return I24;
  return cats[curCat] || [];
}

function renderCatBar() {
  const bar = document.getElementById('catbar');
  if (!curCat) { bar.innerHTML = '<h2>Select a category</h2>'; return; }
  const icons = getIconsForCat();
  const mc = icons.filter(n => !!m24to16[n]).length;
  const dc = icons.filter(n => dels.has(n)).length;
  bar.innerHTML = `<h2>${curCat === 'all' ? 'All Icons' : curCat}</h2><span class="inf"><b>${mc}</b>/${icons.length} mapped${dc ? ' &middot; <b style="color:var(--red)">'+dc+'</b> delete' : ''}</span>`;
}

function shortN(name) {
  if (!curCat || curCat === 'all') return name;
  // Strip known prefixes for readability when in a specific category
  for (const prefixes of Object.values(CAT_MAP)) {
    for (const p of prefixes) {
      if (name.startsWith(p + '-')) return name.slice(p.length + 1);
      if (name === p) return name;
    }
  }
  return name;
}

function renderCol24() {
  const el = document.getElementById('list24');
  const ct = document.getElementById('ct-24');
  el.classList.toggle('grid-mode', view24 === 'grid');
  if (!curCat) { el.innerHTML = '<div style="padding:20px;color:var(--muted);text-align:center">Pick a category</div>'; ct.textContent = ''; return; }
  let icons = getIconsForCat();
  if (q24) { const q = q24.toLowerCase(); icons = icons.filter(n => n.toLowerCase().includes(q)); }
  ct.textContent = icons.length;

  const mapped = icons.filter(n => n in m24to16);
  const unmapped = icons.filter(n => !(n in m24to16));
  const isGrid = view24 === 'grid';

  let h = '';
  if (mapped.length) {
    h += '<div class="section-label">Mapped</div>';
    for (const n of mapped) {
      const n16 = m24to16[n]; const d = dels.has(n);
      const ttl = `${shortN(n)} → ${n16}`;
      h += `<div class="row paired ${d ? 'del' : ''}" title="${ttl}">
        <input type="checkbox" class="del-cb" ${d?'checked':''} onclick="event.stopPropagation();toggleDel('${n}')" title="Delete">
        <div class="rthumb s24"><img src="${B24}${n}.svg"></div>
        <div class="rname" title="${n}">${shortN(n)}</div>
        <div class="rpair">
          <div class="rpair-thumb"><img src="${B16}${n16}.svg"></div>
          <span class="rpair-name">${n16}</span>
        </div>
        <button class="xbtn" onclick="event.stopPropagation();unmap24('${n}')">x</button>
        ${isGrid ? `<div class="gpair"><img src="${B16}${n16}.svg"></div>` : ''}
      </div>`;
    }
  }
  if (unmapped.length) {
    h += '<div class="section-label">Unmapped</div>';
    for (const n of unmapped) {
      const s = sel24 === n; const d = dels.has(n);
      h += `<div class="row ${s?'sel':''} ${d?'del':''}" onclick="click24('${n}')" title="${shortN(n)}">
        <input type="checkbox" class="del-cb" ${d?'checked':''} onclick="event.stopPropagation();toggleDel('${n}')" title="Delete">
        <div class="rthumb s24"><img src="${B24}${n}.svg"></div>
        <div class="rname" title="${n}">${shortN(n)}</div>
        ${s ? '<span class="badge badge-sel">SEL</span>' : ''}
      </div>`;
    }
  }
  el.innerHTML = h;
}

function renderCol16() {
  const el = document.getElementById('list16');
  const ct = document.getElementById('ct-16');
  el.classList.toggle('grid-mode', view16 === 'grid');
  let icons = [...I16];
  if (q16) { const q = q16.toLowerCase(); icons = icons.filter(n => n.toLowerCase().includes(q)); }

  // Sort: unused first, then by usage count ascending, then alpha
  icons.sort((a, b) => {
    const ca = countFor16(a), cb = countFor16(b);
    if (ca === 0 && cb > 0) return -1;
    if (ca > 0 && cb === 0) return 1;
    if (ca !== cb) return ca - cb;
    return a.localeCompare(b);
  });

  const unusedCount = I16.filter(n => !is16Used(n) && !dels.has(n)).length;
  ct.textContent = `${unusedCount} unused`;
  const isGrid = view16 === 'grid';

  let h = '';
  let prevUsed = null;
  for (const n of icons) {
    const c = countFor16(n);
    const used = c > 0;
    const d = dels.has(n);
    const s = sel16 === n;

    if (prevUsed === null || prevUsed !== used) {
      h += `<div class="section-label">${used ? 'In Use' : 'Available'}</div>`;
      prevUsed = used;
    }

    h += `<div class="row ${s?'sel':''} ${d?'del':''}" onclick="click16('${n}')" title="${n}${c > 0 ? ' (×'+c+')' : ''}">
      <input type="checkbox" class="del-cb" ${d?'checked':''} onclick="event.stopPropagation();toggleDel('${n}')" title="Delete">
      <div class="rthumb s16"><img src="${B16}${n}.svg"></div>
      <div class="rname" title="${n}">${n}</div>
      ${c > 0 ? `<span class="badge badge-map">\u00d7${c}</span>` : ''}
      ${s ? '<span class="badge badge-sel">SEL</span>' : ''}
      ${isGrid && c > 0 ? `<span class="gbadge">\u00d7${c}</span>` : ''}
    </div>`;
  }
  el.innerHTML = h;
}

// ══════════════════════════════════════════
// EXPORT
// ══════════════════════════════════════════

function doExport() {
  const entries = Object.entries(m24to16).sort((a, b) => a[0].localeCompare(b[0]));
  const used16 = new Set(Object.values(m24to16));

  // Build grouped view: {n16: [n24, ...]}
  const grouped = {};
  for (const [n24, n16] of entries) {
    if (!grouped[n16]) grouped[n16] = [];
    grouped[n16].push(n24);
  }

  let out = `// RDNA Icon Size Map — exported ${new Date().toISOString().slice(0,10)}\n`;
  out += `// Pairs: ${entries.length}  |  Unique 16px: ${used16.size}  |  Deleted: ${dels.size}\n\n`;

  // 24px → 16px map (primary)
  out += `export const ICON_24_TO_16: Record<string, string> = {\n`;
  for (const [k24, v16] of entries) out += `  '${k24}': '${v16}',\n`;
  out += `};\n\n`;

  // Grouped by 16px (for reference)
  out += `// ── Grouped by 16px icon ──\n`;
  for (const n16 of Object.keys(grouped).sort()) {
    const list = grouped[n16].sort();
    out += `// ${n16} (${list.length}): ${list.join(', ')}\n`;
  }

  if (dels.size) {
    const d16 = [...dels].filter(n => I16.includes(n)).sort();
    const d24 = [...dels].filter(n => I24.includes(n)).sort();
    out += `\n// ── Marked for deletion ──\n`;
    if (d16.length) out += `// 16px (${d16.length}): ${d16.join(', ')}\n`;
    if (d24.length) out += `// 24px (${d24.length}): ${d24.join(', ')}\n`;
  }
  document.getElementById('modal-out').textContent = out;
  document.getElementById('modal').classList.add('on');
}
function copyExport() { navigator.clipboard.writeText(document.getElementById('modal-out').textContent); }
function closeModal() { document.getElementById('modal').classList.remove('on'); }

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════

load();
curCat = catList[0];
render();

document.getElementById('q24').addEventListener('input', e => { q24 = e.target.value; renderCol24(); });
document.getElementById('q16').addEventListener('input', e => { q16 = e.target.value; renderCol16(); });
document.getElementById('btn-undo').addEventListener('click', doUndo);
document.getElementById('btn-reset').addEventListener('click', reset);
document.getElementById('btn-export').addEventListener('click', doExport);
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { sel24 = null; sel16 = null; closeModal(); render(); }
  if (e.key === 'z' && (e.metaKey || e.ctrlKey)) { e.preventDefault(); doUndo(); }
});
</script>
</body>
</html>
