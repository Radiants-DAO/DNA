<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Corner Approaches — Performance Comparison</title>
<style>
  :root {
    --color-page: #ffffff;
    --color-line: #0F0E0C;
    --color-card: #FEF8E2;
    --color-accent: #E8C840;
    --grid: 19;
    --grid-px: 20px;
    --radius-px: 21px; /* grid + 1 */
    --card-border-width: 1px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: var(--color-page);
    color: var(--color-line);
    padding: 2rem;
  }

  h1 {
    font-size: 1.5rem;
    margin-bottom: 0.25rem;
  }

  .subtitle {
    font-size: 0.85rem;
    opacity: 0.6;
    margin-bottom: 2rem;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 2rem;
    margin-bottom: 3rem;
  }

  .approach {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }

  .approach h2 {
    font-size: 0.95rem;
    font-weight: 600;
  }

  .approach .tag {
    display: inline-block;
    font-size: 0.7rem;
    padding: 0.15rem 0.4rem;
    border-radius: 3px;
    font-weight: 600;
    vertical-align: middle;
    margin-left: 0.5rem;
  }

  .tag.green { background: #d4edda; color: #155724; }
  .tag.yellow { background: #fff3cd; color: #856404; }
  .tag.red { background: #f8d7da; color: #721c24; }

  .card-wrapper {
    background: #f5edd5;
    padding: 2rem;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 180px;
  }

  /* Shared card style — each approach overrides corners */
  .demo-card {
    width: 220px;
    height: 120px;
    background: var(--color-card);
    border: 1px solid var(--color-line);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.8rem;
    font-weight: 500;
    position: relative;
  }

  .meta {
    font-size: 0.75rem;
    line-height: 1.5;
    opacity: 0.7;
  }

  .meta strong { opacity: 1; }

  .dom-count {
    font-size: 0.8rem;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }

  .dom-count .num {
    font-size: 1.4rem;
    display: block;
  }

  .pros-cons {
    font-size: 0.72rem;
    line-height: 1.6;
  }

  .pros-cons .pro::before { content: '✓ '; color: #155724; font-weight: bold; }
  .pros-cons .con::before { content: '✗ '; color: #721c24; font-weight: bold; }

  /* ================================================================
     1. Current: Individual <rect> elements
     ================================================================ */
  .card-rects {
    border-radius: var(--radius-px);
  }

  /* ================================================================
     2. bitsToPath: Single <path> per layer
     ================================================================ */
  .card-path {
    border-radius: var(--radius-px);
  }

  /* ================================================================
     3. CSS mask-image (host clip, zero added DOM)
     ================================================================ */
  .card-mask {
    border: none !important;
    border-radius: var(--radius-px);
    mask-image:
      linear-gradient(white, white),
      var(--pc-xl-cover-tl),
      var(--pc-xl-cover-tr),
      var(--pc-xl-cover-bl),
      var(--pc-xl-cover-br);
    mask-position: 0 0, 0 0, 100% 0, 0 100%, 100% 100%;
    mask-size:
      100% 100%,
      var(--grid-px) var(--grid-px),
      var(--grid-px) var(--grid-px),
      var(--grid-px) var(--grid-px),
      var(--grid-px) var(--grid-px);
    mask-repeat: no-repeat;
    mask-composite: subtract, add, add, add, add;
    -webkit-mask-image:
      var(--pc-xl-cover-tl),
      var(--pc-xl-cover-tr),
      var(--pc-xl-cover-bl),
      var(--pc-xl-cover-br),
      linear-gradient(white, white);
    -webkit-mask-position: 0 0, 100% 0, 0 100%, 100% 100%, 0 0;
    -webkit-mask-size:
      var(--grid-px) var(--grid-px),
      var(--grid-px) var(--grid-px),
      var(--grid-px) var(--grid-px),
      var(--grid-px) var(--grid-px),
      100% 100%;
    -webkit-mask-repeat: no-repeat;
    -webkit-mask-composite:
      destination-out,
      destination-out,
      destination-out,
      destination-out,
      source-over;
  }

  .card-mask-gradient {
    border: none !important;
    border-radius: var(--radius-px);
    mask-image:
      linear-gradient(white, white),
      var(--pc-xl-cover-grad-images);
    mask-position:
      0 0,
      var(--pc-xl-cover-grad-positions);
    mask-size:
      100% 100%,
      var(--pc-xl-cover-grad-sizes);
    mask-repeat: no-repeat;
    mask-composite: subtract, var(--pc-xl-cover-grad-composites);
    -webkit-mask-image:
      var(--pc-xl-cover-grad-images),
      linear-gradient(white, white);
    -webkit-mask-position:
      var(--pc-xl-cover-grad-positions),
      0 0;
    -webkit-mask-size:
      var(--pc-xl-cover-grad-sizes),
      100% 100%;
    -webkit-mask-repeat: no-repeat;
    -webkit-mask-composite:
      var(--pc-xl-cover-grad-webkit-composites),
      source-over;
  }

  .card-mask::after,
  .card-clip::after {
    content: '';
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 2;
    background-color: var(--color-line);
    mask-image:
      var(--pc-xl-border-tl),
      var(--pc-xl-border-tr),
      var(--pc-xl-border-bl),
      var(--pc-xl-border-br),
      linear-gradient(white, white),
      linear-gradient(white, white),
      linear-gradient(white, white),
      linear-gradient(white, white);
    -webkit-mask-image:
      var(--pc-xl-border-tl),
      var(--pc-xl-border-tr),
      var(--pc-xl-border-bl),
      var(--pc-xl-border-br),
      linear-gradient(white, white),
      linear-gradient(white, white),
      linear-gradient(white, white),
      linear-gradient(white, white);
    mask-position:
      0 0,
      100% 0,
      0 100%,
      100% 100%,
      50% 0,
      100% 50%,
      50% 100%,
      0 50%;
    -webkit-mask-position:
      0 0,
      100% 0,
      0 100%,
      100% 100%,
      50% 0,
      100% 50%,
      50% 100%,
      0 50%;
    mask-size:
      var(--grid-px) var(--grid-px),
      var(--grid-px) var(--grid-px),
      var(--grid-px) var(--grid-px),
      var(--grid-px) var(--grid-px),
      calc(100% - (var(--grid-px) * 2)) var(--card-border-width),
      var(--card-border-width) calc(100% - (var(--grid-px) * 2)),
      calc(100% - (var(--grid-px) * 2)) var(--card-border-width),
      var(--card-border-width) calc(100% - (var(--grid-px) * 2));
    -webkit-mask-size:
      var(--grid-px) var(--grid-px),
      var(--grid-px) var(--grid-px),
      var(--grid-px) var(--grid-px),
      var(--grid-px) var(--grid-px),
      calc(100% - (var(--grid-px) * 2)) var(--card-border-width),
      var(--card-border-width) calc(100% - (var(--grid-px) * 2)),
      calc(100% - (var(--grid-px) * 2)) var(--card-border-width),
      var(--card-border-width) calc(100% - (var(--grid-px) * 2));
    mask-repeat: no-repeat;
    -webkit-mask-repeat: no-repeat;
    mask-composite: add, add, add, add, add, add, add, add;
    -webkit-mask-composite:
      source-over,
      source-over,
      source-over,
      source-over,
      source-over,
      source-over,
      source-over,
      source-over;
  }

  .card-mask-gradient::after {
    content: '';
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 2;
    background-color: var(--color-line);
    mask-image:
      var(--pc-xl-border-grad-images),
      linear-gradient(white, white),
      linear-gradient(white, white),
      linear-gradient(white, white),
      linear-gradient(white, white);
    -webkit-mask-image:
      var(--pc-xl-border-grad-images),
      linear-gradient(white, white),
      linear-gradient(white, white),
      linear-gradient(white, white),
      linear-gradient(white, white);
    mask-position:
      var(--pc-xl-border-grad-positions),
      50% 0,
      100% 50%,
      50% 100%,
      0 50%;
    -webkit-mask-position:
      var(--pc-xl-border-grad-positions),
      50% 0,
      100% 50%,
      50% 100%,
      0 50%;
    mask-size:
      var(--pc-xl-border-grad-sizes),
      calc(100% - (var(--grid-px) * 2)) var(--card-border-width),
      var(--card-border-width) calc(100% - (var(--grid-px) * 2)),
      calc(100% - (var(--grid-px) * 2)) var(--card-border-width),
      var(--card-border-width) calc(100% - (var(--grid-px) * 2));
    -webkit-mask-size:
      var(--pc-xl-border-grad-sizes),
      calc(100% - (var(--grid-px) * 2)) var(--card-border-width),
      var(--card-border-width) calc(100% - (var(--grid-px) * 2)),
      calc(100% - (var(--grid-px) * 2)) var(--card-border-width),
      var(--card-border-width) calc(100% - (var(--grid-px) * 2));
    mask-repeat: no-repeat;
    -webkit-mask-repeat: no-repeat;
    mask-composite: var(--pc-xl-border-grad-composites), add, add, add, add;
    -webkit-mask-composite: var(--pc-xl-border-grad-source-over), source-over, source-over, source-over, source-over;
  }

  /* ================================================================
     4. Old CSS clip-path
     ================================================================ */
  .card-clip {
    border: none !important;
    /* clip-path set by JS */
  }

  /* ================================================================
     Stress test section
     ================================================================ */
  .stress-section {
    margin-top: 3rem;
    border-top: 1px solid rgba(0,0,0,0.1);
    padding-top: 2rem;
  }

  .stress-section h2 {
    font-size: 1.1rem;
    margin-bottom: 0.5rem;
  }

  .stress-controls {
    display: flex;
    gap: 1rem;
    align-items: center;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }

  .stress-controls label {
    font-size: 0.8rem;
    font-weight: 600;
  }

  .stress-controls select, .stress-controls button {
    font-size: 0.8rem;
    padding: 0.3rem 0.6rem;
  }

  .stress-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    min-height: 100px;
    padding: 1rem;
    background: #f5edd5;
    border-radius: 8px;
  }

  .stress-card {
    width: 48px;
    height: 32px;
    background: var(--color-card);
    border: 1px solid var(--color-line);
    position: relative;
    border-radius: var(--radius-px);
    font-size: 0;
  }

  /* ================================================================
     Controls panel
     ================================================================ */
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem 1.5rem;
    padding: 1rem 1.25rem;
    margin-bottom: 1.5rem;
    background: #f8f8f8;
    border: 1px solid #e0e0e0;
    border-radius: 6px;
  }

  .control-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.75rem;
    font-weight: 500;
  }

  .control-row label {
    min-width: 120px;
    white-space: nowrap;
  }

  .control-row .val {
    font-variant-numeric: tabular-nums;
    font-weight: 700;
    min-width: 1.5em;
    display: inline-block;
    text-align: right;
  }

  .control-row input[type="range"] {
    width: 120px;
  }

  .control-row input[type="color"] {
    width: 32px;
    height: 22px;
    border: 1px solid #ccc;
    border-radius: 3px;
    padding: 0;
    cursor: pointer;
  }

  .control-row select {
    font-size: 0.75rem;
    padding: 0.2rem 0.4rem;
  }

  .stress-results {
    font-size: 0.8rem;
    margin-top: 0.75rem;
    font-variant-numeric: tabular-nums;
  }
</style>
</head>
<body>

<h1>Pixel Corner Approaches</h1>
<p class="subtitle">20×20 canonical pixel circle — compare SVG overlays vs host clipping with SVG mask assets vs host clipping with pure CSS gradient runs</p>

<div class="controls" id="controls">
  <div class="control-row">
    <label>Border Radius <span class="val" id="val-radius">21</span>px</label>
    <input type="range" id="ctrl-radius" min="0" max="40" value="21" step="1">
  </div>
  <div class="control-row">
    <label>Border Color</label>
    <input type="color" id="ctrl-border-color" value="#0F0E0C">
  </div>
  <div class="control-row">
    <label>Border Width <span class="val" id="val-border-width">1</span>px</label>
    <input type="range" id="ctrl-border-width" min="0" max="4" value="1" step="1">
  </div>
  <div class="control-row">
    <label>Card BG Opacity <span class="val" id="val-bg-opacity">25</span>%</label>
    <input type="range" id="ctrl-bg-opacity" min="0" max="100" value="25" step="5">
  </div>
  <div class="control-row">
    <label>Box Shadow</label>
    <select id="ctrl-box-shadow">
      <option value="none">none</option>
      <option value="0 2px 8px rgba(0,0,0,0.15)">outside — soft</option>
      <option value="0 4px 16px rgba(0,0,0,0.25)">outside — strong</option>
      <option value="inset 0 2px 8px rgba(0,0,0,0.15)">inset — soft</option>
      <option value="inset 0 4px 16px rgba(0,0,0,0.25)">inset — strong</option>
    </select>
  </div>
  <div class="control-row">
    <label>Drop Shadow (filter)</label>
    <select id="ctrl-drop-shadow">
      <option value="none">none</option>
      <option value="drop-shadow(0 2px 4px rgba(0,0,0,0.15))">soft</option>
      <option value="drop-shadow(0 4px 8px rgba(0,0,0,0.25))">strong</option>
      <option value="drop-shadow(0 1px 0px rgba(0,0,0,1))">pixel — 1px</option>
    </select>
  </div>
  <div class="control-row">
    <label>Shadow Mode</label>
    <select id="ctrl-shadow-mode">
      <option value="direct">direct (on card — clipped by mask)</option>
      <option value="wrapper">wrapper (on parent — survives mask)</option>
    </select>
  </div>
  <div class="control-row">
    <label>Outer BG</label>
    <select id="ctrl-outer-bg">
      <option value="dot-grid">dot grid (white)</option>
      <option value="black">black</option>
      <option value="cream">#FEF8E2 (cream)</option>
      <option value="checkerboard">checkerboard</option>
    </select>
  </div>
</div>

<div class="grid" id="approaches"></div>

<div class="stress-section">
  <h2>Stress Test</h2>
  <p class="meta" style="margin-bottom: 0.75rem">Render N elements with pixel corners. Measures DOM node count + render time.</p>
  <div class="stress-controls">
    <label>Approach:</label>
    <select id="stress-approach">
      <option value="rects">1. SVG rects (current)</option>
      <option value="path">2. SVG path (union)</option>
      <option value="mask">3. CSS mask-image (SVG assets)</option>
      <option value="mask-gradient">4. CSS mask-image (pure gradients)</option>
      <option value="clip-path">5. CSS clip-path</option>
    </select>
    <label>Count:</label>
    <select id="stress-count">
      <option value="50">50</option>
      <option value="100" selected>100</option>
      <option value="200">200</option>
      <option value="500">500</option>
    </select>
    <button onclick="runStress()">Run</button>
    <button onclick="clearStress()">Clear</button>
  </div>
  <div id="stress-results" class="stress-results"></div>
  <div id="stress-grid" class="stress-grid"></div>
</div>

<script>
// ============================================================
// Bitstring data — canonical 20×20 pixel circle (from Figma SVG)
// ============================================================
const GRID = 20;
// Cover: everything LEFT of the border arc (bg-colored, hides smooth radius)
const COVER_BITS =
  '11111111111111110000' + // row 0:  x=0-15
  '11111111111100000000' + // row 1:  x=0-11
  '11111111110000000000' + // row 2:  x=0-9
  '11111111100000000000' + // row 3:  x=0-8
  '11111110000000000000' + // row 4:  x=0-6
  '11111100000000000000' + // row 5:  x=0-5
  '11111000000000000000' + // row 6:  x=0-4
  '11110000000000000000' + // row 7:  x=0-3
  '11110000000000000000' + // row 8:  x=0-3
  '11100000000000000000' + // row 9:  x=0-2
  '11000000000000000000' + // row 10: x=0-1
  '11000000000000000000' + // row 11: x=0-1
  '10000000000000000000' + // row 12: x=0
  '10000000000000000000' + // row 13: x=0
  '10000000000000000000' + // row 14: x=0
  '10000000000000000000' + // row 15: x=0
  '00000000000000000000' + // row 16
  '00000000000000000000' + // row 17
  '00000000000000000000' + // row 18
  '00000000000000000000';  // row 19
// Border: the staircase arc pixels (drawn in line color)
const BORDER_BITS =
  '00000000000000001111' + // row 0:  x=16-19
  '00000000000011110000' + // row 1:  x=12-15
  '00000000001100000000' + // row 2:  x=10-11
  '00000000010000000000' + // row 3:  x=9
  '00000001100000000000' + // row 4:  x=7-8
  '00000010000000000000' + // row 5:  x=6
  '00000100000000000000' + // row 6:  x=5
  '00001000000000000000' + // row 7:  x=4
  '00001000000000000000' + // row 8:  x=4
  '00010000000000000000' + // row 9:  x=3
  '00100000000000000000' + // row 10: x=2
  '00100000000000000000' + // row 11: x=2
  '01000000000000000000' + // row 12: x=1
  '01000000000000000000' + // row 13: x=1
  '01000000000000000000' + // row 14: x=1
  '01000000000000000000' + // row 15: x=1
  '10000000000000000000' + // row 16: x=0
  '10000000000000000000' + // row 17: x=0
  '10000000000000000000' + // row 18: x=0
  '10000000000000000000';  // row 19: x=0

// ============================================================
// Core utilities
// ============================================================
function mirrorH(bits, w, h) {
  let out = '';
  for (let y = 0; y < h; y++) {
    for (let x = w - 1; x >= 0; x--) out += bits[y * w + x];
  }
  return out;
}

function mirrorV(bits, w, h) {
  let out = '';
  for (let y = h - 1; y >= 0; y--) {
    out += bits.slice(y * w, (y + 1) * w);
  }
  return out;
}

function mirrorHV(bits, w, h) { return mirrorH(mirrorV(bits, w, h), w, h); }

// ============================================================
// bitsToPath — run-length encode + vertical merge
// ============================================================
function bitsToPath(bits, w, h) {
  const runs = [];
  for (let y = 0; y < h; y++) {
    let x = 0;
    while (x < w) {
      if (bits[y * w + x] === '1') {
        const start = x;
        while (x < w && bits[y * w + x] === '1') x++;
        runs.push({ x: start, y, w: x - start, h: 1 });
      } else {
        x++;
      }
    }
  }
  // Vertical merge
  for (let i = 0; i < runs.length; i++) {
    if (!runs[i]) continue;
    for (let j = i + 1; j < runs.length; j++) {
      if (!runs[j]) continue;
      if (runs[j].x === runs[i].x &&
          runs[j].w === runs[i].w &&
          runs[j].y === runs[i].y + runs[i].h) {
        runs[i].h += runs[j].h;
        runs[j] = null;
      }
    }
  }
  return runs.filter(Boolean)
    .map(r => `M${r.x},${r.y}h${r.w}v${r.h}h${-r.w}Z`)
    .join('');
}

function bitsToMergedRects(bits, w, h) {
  const runs = [];
  for (let y = 0; y < h; y++) {
    let x = 0;
    while (x < w) {
      if (bits[y * w + x] === '1') {
        const start = x;
        while (x < w && bits[y * w + x] === '1') x++;
        runs.push({ x: start, y, w: x - start, h: 1 });
      } else {
        x++;
      }
    }
  }

  for (let i = 0; i < runs.length; i++) {
    if (!runs[i]) continue;
    for (let j = i + 1; j < runs.length; j++) {
      if (!runs[j]) continue;
      if (runs[j].x === runs[i].x &&
          runs[j].w === runs[i].w &&
          runs[j].y === runs[i].y + runs[i].h) {
        runs[i].h += runs[j].h;
        runs[j] = null;
      }
    }
  }

  return runs.filter(Boolean);
}

// ============================================================
// Pre-compute all corner paths
// ============================================================
const coverTL = bitsToPath(COVER_BITS, GRID, GRID);
const coverTR = bitsToPath(mirrorH(COVER_BITS, GRID, GRID), GRID, GRID);
const coverBL = bitsToPath(mirrorV(COVER_BITS, GRID, GRID), GRID, GRID);
const coverBR = bitsToPath(mirrorHV(COVER_BITS, GRID, GRID), GRID, GRID);

const borderTL = bitsToPath(BORDER_BITS, GRID, GRID);
const borderTR = bitsToPath(mirrorH(BORDER_BITS, GRID, GRID), GRID, GRID);
const borderBL = bitsToPath(mirrorV(BORDER_BITS, GRID, GRID), GRID, GRID);
const borderBR = bitsToPath(mirrorHV(BORDER_BITS, GRID, GRID), GRID, GRID);

const coverRects = bitsToMergedRects(COVER_BITS, GRID, GRID);
const borderRects = bitsToMergedRects(BORDER_BITS, GRID, GRID);

// ============================================================
// listFilledRects (current approach)
// ============================================================
function listFilledRects(bits, w, h) {
  const rects = [];
  for (let i = 0; i < bits.length; i++) {
    if (bits[i] === '1') {
      rects.push({ x: i % w, y: Math.floor(i / w), w: 1, h: 1 });
    }
  }
  return rects;
}

// ============================================================
// Mask SVG data URIs
// ============================================================
function maskURI(pathD, transform) {
  const t = transform ? ` transform="${transform}"` : '';
  return `url("data:image/svg+xml,${encodeURIComponent(
    `<svg xmlns='http://www.w3.org/2000/svg' width='${GRID}' height='${GRID}'><path fill='white'${t} d='${pathD}'/></svg>`
  )}")`;
}

// TL = source path, others use SVG transform to flip
const maskCoverTL = maskURI(coverTL);
const maskCoverTR = maskURI(coverTL, `translate(${GRID},0) scale(-1,1)`);
const maskCoverBL = maskURI(coverTL, `translate(0,${GRID}) scale(1,-1)`);
const maskCoverBR = maskURI(coverTL, `translate(${GRID},${GRID}) scale(-1,-1)`);

const maskBorderTL = maskURI(borderTL);
const maskBorderTR = maskURI(borderTL, `translate(${GRID},0) scale(-1,1)`);
const maskBorderBL = maskURI(borderTL, `translate(0,${GRID}) scale(1,-1)`);
const maskBorderBR = maskURI(borderTL, `translate(${GRID},${GRID}) scale(-1,-1)`);

// Set CSS custom properties for mask approach
const root = document.documentElement;
root.style.setProperty('--pc-xl-cover-tl', maskCoverTL);
root.style.setProperty('--pc-xl-cover-tr', maskCoverTR);
root.style.setProperty('--pc-xl-cover-bl', maskCoverBL);
root.style.setProperty('--pc-xl-cover-br', maskCoverBR);
root.style.setProperty('--pc-xl-border-tl', maskBorderTL);
root.style.setProperty('--pc-xl-border-tr', maskBorderTR);
root.style.setProperty('--pc-xl-border-bl', maskBorderBL);
root.style.setProperty('--pc-xl-border-br', maskBorderBR);

function rectsToGradientMaskVars(rects) {
  const images = [];
  const positions = [];
  const sizes = [];

  for (const rect of rects) {
    const corners = [
      `${rect.x}px ${rect.y}px`,
      `calc(100% - ${rect.x + rect.w}px) ${rect.y}px`,
      `${rect.x}px calc(100% - ${rect.y + rect.h}px)`,
      `calc(100% - ${rect.x + rect.w}px) calc(100% - ${rect.y + rect.h}px)`,
    ];

    for (const pos of corners) {
      images.push('linear-gradient(white, white)');
      positions.push(pos);
      sizes.push(`${rect.w}px ${rect.h}px`);
    }
  }

  return {
    images: images.join(', '),
    positions: positions.join(', '),
    sizes: sizes.join(', '),
    composites: new Array(images.length).fill('add').join(', '),
    webkitDestinationOut: new Array(images.length).fill('destination-out').join(', '),
    webkitSourceOver: new Array(images.length).fill('source-over').join(', '),
  };
}

const coverGradientMask = rectsToGradientMaskVars(coverRects);
const borderGradientMask = rectsToGradientMaskVars(borderRects);

root.style.setProperty('--pc-xl-cover-grad-images', coverGradientMask.images);
root.style.setProperty('--pc-xl-cover-grad-positions', coverGradientMask.positions);
root.style.setProperty('--pc-xl-cover-grad-sizes', coverGradientMask.sizes);
root.style.setProperty('--pc-xl-cover-grad-composites', coverGradientMask.composites);
root.style.setProperty('--pc-xl-cover-grad-webkit-composites', coverGradientMask.webkitDestinationOut);

root.style.setProperty('--pc-xl-border-grad-images', borderGradientMask.images);
root.style.setProperty('--pc-xl-border-grad-positions', borderGradientMask.positions);
root.style.setProperty('--pc-xl-border-grad-sizes', borderGradientMask.sizes);
root.style.setProperty('--pc-xl-border-grad-composites', borderGradientMask.composites);
root.style.setProperty('--pc-xl-border-grad-source-over', borderGradientMask.webkitSourceOver);

// ============================================================
// Clip-path polygon from bitstrings (trace outer contour)
// ============================================================
function bitsToClipPolygon(bits, w, h) {
  // Find the boundary of the FILLED region's complement
  // (the cover bits define what's OUTSIDE the rounded shape)
  // The "content" region is where cover=0 and border=0
  // We want to clip TO the content+border region
  // Simpler: combine cover bits → the complement is the visible shape
  // Trace the outline of the non-cover region

  // For a working prototype, generate polygon from the border arc
  // Walk the border pixels to get the staircase vertices
  const points = [];

  // Collect border pixel coordinates per row
  const rows = [];
  for (let y = 0; y < h; y++) {
    const cols = [];
    for (let x = 0; x < w; x++) {
      if (bits[y * w + x] === '1') cols.push(x);
    }
    if (cols.length) rows.push({ y, min: Math.min(...cols), max: Math.max(...cols) });
  }

  // Walk down the left edge (min col), then up the right edge (max col + 1)
  // to form a closed polygon. This traces the staircase.
  const left = [], right = [];
  for (const r of rows) {
    left.push(`${r.min}px ${r.y}px`);
    left.push(`${r.min}px ${r.y + 1}px`);
    right.push(`${r.max + 1}px ${r.y}px`);
    right.push(`${r.max + 1}px ${r.y + 1}px`);
  }

  return `polygon(${[...left, ...right.reverse()].join(', ')})`;
}

// Full-shape clip-path: combine all 4 corners into one polygon
// For simplicity, use the known XL polygon from pixel-corners.config
function makeFullClipPath() {
  // Generate from bitstrings: the visible shape boundary
  // Cover = outside pixels. Border = edge pixels. Content = inside.
  // The clip should include border + content (exclude cover).

  // Find rightmost non-cover column per row for TL quadrant
  const boundary = [];
  for (let y = 0; y < GRID; y++) {
    let rightmost = -1;
    for (let x = GRID - 1; x >= 0; x--) {
      if (COVER_BITS[y * GRID + x] === '0') { rightmost = x; break; }
    }
    boundary.push(rightmost);
  }

  // Build polygon for full shape (4 quadrants mirrored)
  // Only need TL boundary, mirror for other 3
  // Top-left quadrant: boundary[y] is the leftmost visible x
  // Going clockwise: top edge (TL→TR) → right edge (TR→BR) → bottom (BR→BL) → left (BL→TL)

  // TL boundary: for each row, the first non-cover column
  const tlBound = [];
  for (let y = 0; y < GRID; y++) {
    let first = GRID;
    for (let x = 0; x < GRID; x++) {
      if (COVER_BITS[y * GRID + x] === '0') { first = x; break; }
    }
    tlBound.push(first);
  }

  // Build staircase points going DOWN the left edge of TL quadrant
  const pts = [];
  let prevX = tlBound[0];
  pts.push([prevX, 0]);
  for (let y = 1; y < GRID; y++) {
    if (tlBound[y] !== prevX) {
      pts.push([prevX, y]);
      pts.push([tlBound[y], y]);
      prevX = tlBound[y];
    }
  }
  pts.push([prevX, GRID]);

  // Full shape width/height placeholder (we'll use percentages for flexibility)
  // For a fixed-size demo, use pixel coords with mirroring
  const W = 220, H = 120; // match card size

  // TL left edge (going down)
  const leftEdge = pts.map(([x, y]) => `${x}px ${y}px`);
  // BL left edge (mirror V — going up from bottom)
  const blEdge = pts.slice().reverse().map(([x, y]) => `${x}px ${H - y}px`);
  // TR right edge (mirror H — going down)
  const trEdge = pts.map(([x, y]) => `${W - x}px ${y}px`);
  // BR right edge (mirror HV — going up from bottom)
  const brEdge = pts.slice().reverse().map(([x, y]) => `${W - x}px ${H - y}px`);

  // Clockwise: TL top→down, BL down→bottom, BR bottom→up, TR up→top
  const all = [...leftEdge, ...blEdge.slice(1), ...brEdge.slice(1), ...trEdge.slice(1).reverse()];
  return `polygon(${all.join(', ')})`;
}

// ============================================================
// Render approaches
// ============================================================
const container = document.getElementById('approaches');

function countNodes(el) {
  // Count all descendant nodes (elements only)
  return el.querySelectorAll('*').length;
}

// Helper: create SVG corner overlay (for approaches 1 & 2)
function createCornerSVG(pos, coverContent, borderContent) {
  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.setAttribute('width', GRID);
  svg.setAttribute('height', GRID);
  svg.setAttribute('viewBox', `0 0 ${GRID} ${GRID}`);
  svg.setAttribute('aria-hidden', 'true');
  svg.style.cssText = `position:absolute;pointer-events:none;z-index:1;overflow:visible;${
    pos === 'tl' || pos === 'tr' ? 'top:-1px;' : 'bottom:-1px;'
  }${pos === 'tl' || pos === 'bl' ? 'left:-1px;' : 'right:-1px;'}`;
  svg.innerHTML = coverContent + borderContent;
  return svg;
}

// --- Approach 1: Current (individual <rect> per pixel) ---
function renderRects(parent) {
  const positions = ['tl', 'tr', 'bl', 'br'];
  const mirrors = {
    tl: [COVER_BITS, BORDER_BITS],
    tr: [mirrorH(COVER_BITS, GRID, GRID), mirrorH(BORDER_BITS, GRID, GRID)],
    bl: [mirrorV(COVER_BITS, GRID, GRID), mirrorV(BORDER_BITS, GRID, GRID)],
    br: [mirrorHV(COVER_BITS, GRID, GRID), mirrorHV(BORDER_BITS, GRID, GRID)],
  };

  for (const pos of positions) {
    const [cBits, bBits] = mirrors[pos];
    const cRects = listFilledRects(cBits, GRID, GRID);
    const bRects = listFilledRects(bBits, GRID, GRID);

    let border = '';
    for (const r of bRects) {
      border += `<rect x="${r.x}" y="${r.y}" width="1" height="1" fill="var(--color-line)"/>`;
    }

    parent.appendChild(createCornerSVG(pos, '', border));
  }
}

// --- Approach 2: Union <path> ---
function renderPaths(parent) {
  const corners = [
    ['tl', coverTL, borderTL],
    ['tr', coverTR, borderTR],
    ['bl', coverBL, borderBL],
    ['br', coverBR, borderBR],
  ];

  for (const [pos, cPath, bPath] of corners) {
    parent.appendChild(createCornerSVG(pos,
      '',
      `<path fill="var(--color-line)" d="${bPath}"/>`
    ));
  }
}

// --- Approach 3: CSS mask (rendered via class) ---
// Host-level clipping handled by CSS mask; ::after draws the full border ring.

// --- Approach 4: clip-path ---
function renderClipPath(card) {
  card.style.clipPath = makeFullClipPath();
}

// ============================================================
// Build the comparison grid
// ============================================================
const approaches = [
  {
    id: 'rects',
    title: '1. SVG <rect> per pixel',
    tag: ['red', 'CURRENT'],
    render(card) { renderRects(card); },
    pros: ['CSS var() for colors', 'Theme/dark mode safe'],
    cons: ['~400 DOM nodes per element', 'Heavy at scale — laggy UI tab'],
  },
  {
    id: 'path',
    title: '2. SVG <path> union',
    tag: ['yellow', 'PROPOSED'],
    render(card) { renderPaths(card); },
    pros: ['CSS var() for colors', '~8 DOM nodes per element', 'Same visual fidelity'],
    cons: ['Still real DOM nodes (SVG elements)'],
  },
  {
    id: 'mask',
    title: '3. CSS mask-image (inverse clip)',
    tag: ['green', 'NOVEL'],
    cardClass: 'card-mask',
    render() { /* CSS handles it */ },
    pros: ['0 added DOM nodes', 'Clips bg + children to staircase', 'No cover-layer bg dependency'],
    cons: ['Clips box-shadow to shape', 'Needs separate border overlay', 'Safari needs -webkit mask composite'],
  },
  {
    id: 'mask-gradient',
    title: '4. CSS mask-image (pure gradients)',
    tag: ['yellow', 'EXPERIMENT'],
    cardClass: 'card-mask-gradient',
    render() { /* CSS handles it */ },
    pros: ['0 added DOM nodes', 'No SVG or data URIs', 'Generated directly from merged bitstring rects'],
    cons: ['Many mask layers', 'Likely heavier paint/compositing', 'Still clips box-shadow to shape'],
  },
  {
    id: 'clip-path',
    title: '5. CSS clip-path (old)',
    tag: ['red', 'LEGACY'],
    cardClass: 'card-clip',
    render(card) { renderClipPath(card); },
    pros: ['0 added DOM nodes', 'Clips bg + children to staircase', 'Fast geometry'],
    cons: ['Clips box-shadow', 'Needs separate border overlay', 'Harder to parametrize by bitmaps'],
  },
];

for (const a of approaches) {
  const section = document.createElement('div');
  section.className = 'approach';

  const card = document.createElement('div');
  card.className = `demo-card ${a.cardClass || `card-${a.id}`}`;
  card.textContent = 'Pixel Corners';
  card.dataset.approach = a.id;

  a.render(card);

  const wrapper = document.createElement('div');
  wrapper.className = 'card-wrapper';
  wrapper.appendChild(card);

  // Count nodes AFTER render
  requestAnimationFrame(() => {
    const count = countNodes(card);
    const countEl = section.querySelector('.dom-count .num');
    if (countEl) countEl.textContent = count;
  });

  section.innerHTML = `
    <h2>${a.title} <span class="tag ${a.tag[0]}">${a.tag[1]}</span></h2>
  `;
  section.appendChild(wrapper);
  section.innerHTML += `
    <div class="dom-count">DOM nodes inside card: <span class="num">…</span></div>
    <div class="pros-cons">
      ${a.pros.map(p => `<div class="pro">${p}</div>`).join('')}
      ${a.cons.map(c => `<div class="con">${c}</div>`).join('')}
    </div>
  `;

  container.appendChild(section);
}

// Fix: re-render cards since innerHTML clobbered them
container.innerHTML = '';
for (const a of approaches) {
  const section = document.createElement('div');
  section.className = 'approach';

  const h2 = document.createElement('h2');
  h2.innerHTML = `${a.title} <span class="tag ${a.tag[0]}">${a.tag[1]}</span>`;
  section.appendChild(h2);

  const wrapper = document.createElement('div');
  wrapper.className = 'card-wrapper';

  // Outer card: no border-radius, gold bg, red inset outline
  const outer = document.createElement('div');
  outer.className = 'demo-card';
  outer.style.cssText = `
    width: 260px; height: 160px; position: relative;
    background: white;
    background-image: radial-gradient(circle, #ccc 1px, transparent 1px);
    background-size: 8px 8px;
    border-radius: 0;
    border: none;
    outline: 1px solid red;
    outline-offset: -1px;
    display: flex; align-items: stretch; justify-content: stretch;
    padding: 20px;
  `;

  // Inner card: same size, pixel corner technique applied, red inset outline
  const card = document.createElement('div');
  card.className = `demo-card ${a.cardClass || ''}`;
  card.style.cssText = `
    width: 100%; height: 100%; position: relative;
    background: rgb(0 128 0 / 0.25);
    outline: 1px solid red;
    outline-offset: -1px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.8rem; font-weight: 500;
  `;
  card.style.borderRadius = (a.id === 'clip-path') ? '' : '21px';
  card.style.border = (a.id === 'mask' || a.id === 'mask-gradient' || a.id === 'clip-path')
    ? 'none'
    : '1px solid var(--color-line)';
  card.textContent = 'Pixel Corners';
  a.render(card);

  // Shadow wrapper sits between outer and card.
  // In "wrapper" shadow mode, the filter goes here instead of on the card,
  // so the drop-shadow survives the card's mask clipping.
  const shadowWrap = document.createElement('div');
  shadowWrap.className = 'shadow-wrapper';
  shadowWrap.style.cssText = 'width:100%;height:100%;';
  shadowWrap.appendChild(card);
  outer.appendChild(shadowWrap);
  wrapper.appendChild(outer);
  section.appendChild(wrapper);

  const domCount = document.createElement('div');
  domCount.className = 'dom-count';
  const num = countNodes(card);
  domCount.innerHTML = `DOM nodes: <span class="num">${num}</span>`;
  section.appendChild(domCount);

  const pc = document.createElement('div');
  pc.className = 'pros-cons';
  pc.innerHTML =
    a.pros.map(p => `<div class="pro">${p}</div>`).join('') +
    a.cons.map(c => `<div class="con">${c}</div>`).join('');
  section.appendChild(pc);

  container.appendChild(section);
}

// ============================================================
// Stress test
// ============================================================
function runStress() {
  const approach = document.getElementById('stress-approach').value;
  const count = parseInt(document.getElementById('stress-count').value);
  const grid = document.getElementById('stress-grid');
  const results = document.getElementById('stress-results');

  grid.innerHTML = '';
  results.textContent = 'Rendering…';

  requestAnimationFrame(() => {
    const t0 = performance.now();

    const fragment = document.createDocumentFragment();
    for (let i = 0; i < count; i++) {
      const card = document.createElement('div');
      card.className = 'stress-card';

      if (approach === 'rects') {
        renderRects(card);
      } else if (approach === 'path') {
        renderPaths(card);
      } else if (approach === 'mask') {
        card.classList.add('card-mask');
        card.style.border = 'none';
      } else if (approach === 'mask-gradient') {
        card.classList.add('card-mask-gradient');
        card.style.border = 'none';
      } else if (approach === 'clip-path') {
        card.classList.add('card-clip');
        card.style.border = 'none';
        card.style.width = '48px';
        card.style.height = '32px';
        card.style.clipPath = makeFullClipPath().replace(/220/g, '48').replace(/120/g, '32');
      }

      fragment.appendChild(card);
    }

    grid.appendChild(fragment);

    requestAnimationFrame(() => {
      const t1 = performance.now();
      const totalNodes = grid.querySelectorAll('*').length;
      results.innerHTML = `
        <strong>${count} elements</strong> ×
        <strong>${approach}</strong>:
        ${totalNodes.toLocaleString()} total DOM nodes,
        render time: ${(t1 - t0).toFixed(1)}ms
      `;
    });
  });
}

function clearStress() {
  document.getElementById('stress-grid').innerHTML = '';
  document.getElementById('stress-results').textContent = '';
}

// ============================================================
// Controls — update all cards as a group
// ============================================================
function setupControls() {
  const allCards = () => document.querySelectorAll('#approaches .demo-card:not([style*="dot-grid"])');
  const allOuters = () => document.querySelectorAll('#approaches .demo-card + .demo-card, #approaches > .approach .card-wrapper > div:first-child');

  function getInnerCards() {
    return document.querySelectorAll('#approaches .shadow-wrapper > div');
  }
  function getOuterCards() {
    return document.querySelectorAll('#approaches .card-wrapper > div:first-child');
  }
  function getShadowWrappers() {
    return document.querySelectorAll('#approaches .shadow-wrapper');
  }

  // Border radius
  const radiusCtrl = document.getElementById('ctrl-radius');
  const radiusVal = document.getElementById('val-radius');
  radiusCtrl.addEventListener('input', () => {
    radiusVal.textContent = radiusCtrl.value;
    getInnerCards().forEach(card => {
      // skip clip-path approach (no border-radius)
      if (!card.style.clipPath) {
        card.style.borderRadius = radiusCtrl.value + 'px';
      }
    });
  });

  // Border color
  const borderColorCtrl = document.getElementById('ctrl-border-color');
  borderColorCtrl.addEventListener('input', () => {
    document.documentElement.style.setProperty('--color-line', borderColorCtrl.value);
  });

  // Border width
  const borderWidthCtrl = document.getElementById('ctrl-border-width');
  const borderWidthVal = document.getElementById('val-border-width');
  borderWidthCtrl.addEventListener('input', () => {
    borderWidthVal.textContent = borderWidthCtrl.value;
    document.documentElement.style.setProperty('--card-border-width', borderWidthCtrl.value + 'px');
    getInnerCards().forEach(card => {
      if (!card.style.clipPath) {
        card.style.borderWidth = borderWidthCtrl.value + 'px';
      }
    });
  });

  // Card BG opacity
  const bgOpacityCtrl = document.getElementById('ctrl-bg-opacity');
  const bgOpacityVal = document.getElementById('val-bg-opacity');
  bgOpacityCtrl.addEventListener('input', () => {
    bgOpacityVal.textContent = bgOpacityCtrl.value;
    const alpha = bgOpacityCtrl.value / 100;
    getInnerCards().forEach(card => {
      card.style.background = `rgb(0 128 0 / ${alpha})`;
    });
  });

  // Box shadow
  const boxShadowCtrl = document.getElementById('ctrl-box-shadow');
  boxShadowCtrl.addEventListener('change', () => {
    getInnerCards().forEach(card => {
      card.style.boxShadow = boxShadowCtrl.value;
    });
  });

  // Drop shadow (filter) + shadow mode
  const dropShadowCtrl = document.getElementById('ctrl-drop-shadow');
  const shadowModeCtrl = document.getElementById('ctrl-shadow-mode');

  function applyDropShadow() {
    const val = dropShadowCtrl.value === 'none' ? '' : dropShadowCtrl.value;
    const mode = shadowModeCtrl.value;

    if (mode === 'wrapper') {
      // Filter on wrapper (survives mask on card)
      getInnerCards().forEach(card => { card.style.filter = ''; });
      getShadowWrappers().forEach(wrap => { wrap.style.filter = val; });
    } else {
      // Filter directly on card (gets clipped by mask)
      getShadowWrappers().forEach(wrap => { wrap.style.filter = ''; });
      getInnerCards().forEach(card => { card.style.filter = val; });
    }
  }

  dropShadowCtrl.addEventListener('change', applyDropShadow);
  shadowModeCtrl.addEventListener('change', applyDropShadow);

  // Outer BG
  const outerBgCtrl = document.getElementById('ctrl-outer-bg');
  outerBgCtrl.addEventListener('change', () => {
    const v = outerBgCtrl.value;
    getOuterCards().forEach(outer => {
      switch (v) {
        case 'dot-grid':
          outer.style.background = 'white';
          outer.style.backgroundImage = 'radial-gradient(circle, #ccc 1px, transparent 1px)';
          outer.style.backgroundSize = '8px 8px';
          break;
        case 'black':
          outer.style.background = '#000';
          outer.style.backgroundImage = '';
          break;
        case 'cream':
          outer.style.background = '#FEF8E2';
          outer.style.backgroundImage = '';
          break;
        case 'checkerboard':
          outer.style.background = '#fff';
          outer.style.backgroundImage = 'linear-gradient(45deg, #ddd 25%, transparent 25%, transparent 75%, #ddd 75%), linear-gradient(45deg, #ddd 25%, transparent 25%, transparent 75%, #ddd 75%)';
          outer.style.backgroundSize = '16px 16px';
          outer.style.backgroundPosition = '0 0, 8px 8px';
          break;
      }
    });
  });
}

setupControls();
