<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Color Compare</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: oklch(0.1641 0.0044 84.59);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 48px 32px;
    gap: 64px;
    font-family: monospace;
  }
  .column {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .label {
    color: oklch(0.9780 0.0295 94.34 / 0.45);
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .swatch {
    width: 200px;
    height: 52px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    padding: 0 14px;
    gap: 10px;
  }
  .swatch-name {
    font-size: 11px;
    letter-spacing: 0.04em;
    mix-blend-mode: difference;
    color: white;
    opacity: 0.85;
  }
</style>
</head>
<body>

  <!-- Current palette -->
  <div class="column">
    <div class="label">Current</div>
    <div class="swatch" style="background: oklch(0.9780 0.0295 94.34)">
      <span class="swatch-name">cream</span>
    </div>
    <div class="swatch" style="background: oklch(0.1641 0.0044 84.59); outline: 1px solid oklch(0.9780 0.0295 94.34 / 0.15);">
      <span class="swatch-name" style="color: oklch(0.9780 0.0295 94.34); opacity: 0.85; mix-blend-mode: normal;">ink</span>
    </div>
    <div class="swatch" style="background: oklch(0.9126 0.1170 93.68)">
      <span class="swatch-name">sun-yellow</span>
    </div>
    <div class="swatch" style="background: oklch(0.7701 0.0527 236.81)">
      <span class="swatch-name">sky-blue</span>
    </div>
    <div class="swatch" style="background: oklch(0.8546 0.1039 68.93)">
      <span class="swatch-name">sunset-fuzz</span>
    </div>
    <div class="swatch" style="background: oklch(0.7429 0.1568 21.43)">
      <span class="swatch-name">sun-red</span>
    </div>
    <div class="swatch" style="background: oklch(0.9312 0.0702 142.51)">
      <span class="swatch-name">mint</span>
    </div>
    <div class="swatch" style="background: oklch(0.7227 0.1920 149.58)">
      <span class="swatch-name">success-mint</span>
    </div>
  </div>

  <!-- New palette -->
  <div class="column">
    <div class="label">New</div>
    <div class="swatch" style="background: oklch(0.9780 0.0295 94.34)">
      <span class="swatch-name">cream</span>
    </div>
    <div class="swatch" style="background: oklch(0.1641 0.0044 84.59); outline: 1px solid oklch(0.9780 0.0295 94.34 / 0.15);">
      <span class="swatch-name" style="color: oklch(0.9780 0.0295 94.34); opacity: 0.85; mix-blend-mode: normal;">ink</span>
    </div>
    <div class="swatch" style="background: oklch(0.9126 0.1170 93.68)">
      <span class="swatch-name">sun-yellow</span>
    </div>
    <div class="swatch" style="background: oklch(76.3% 0.109 219)">
      <span class="swatch-name">blue</span>
    </div>
    <div class="swatch" style="background: oklch(71.3% 0.105 274)">
      <span class="swatch-name">purple</span>
    </div>
    <div class="swatch" style="background: oklch(66.3% 0.105 184)">
      <span class="swatch-name">teal</span>
    </div>
  </div>

</body>
</html>
